name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libpq (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install libpq (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install libpq
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build
        run: make

      - name: Rename binary
        run: mv bowie bowie-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bowie-${{ matrix.os }}-${{ matrix.arch }}
          path: bowie-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bowie-*
          generate_release_notes: true
